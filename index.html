<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Recipe page</title>

</head>
  <body>

    <!--TODO: 
    
    - Learn how to make a bullet point list
    - Learn about tables
  
    -->

    <main>
      <!--! Image Section -->
      
      <section class="recipe-img"></section>

      <!--! Overview Section -->

      <section class="recipe-overview">
        <div class="overview-heading">
          <h1></h1>
        </div>
        <div class="overview-description">
          <p></p>
        </div>
        <div class="overview-preparation">
        </div>
      </section>

      <!--! Ingredients Section -->

      <section class="recipe-ingredients">
        <div class="ingredients-heading">
          <h1></h1>
        </div>
        <div class="ingredients-items">
        </div>
      </section>
      <hr>

      <!--! Instructions Section -->

      <section class="recipe-instructions">
        <div class="instructions-heading">
          <h1></h1>
        </div>
        <div class="instructions-list">
        </div>
      </section>
      <hr>

      <!--! Nutrition Section -->

      <section class="recipe-nutrition">
        <div class="nutrition-heading">
          <h1></h1>
        </div>
        <div class="nutrition-description">
          <p></p>
        </div>
        <div class="nutrition-table">

        </div>
      </section>

    </main>




  </body>
</html>
